server:
  port: 8085
  servlet:
    context-path: /provider

fint:
  metamodel:
    base-url: http://localhost:8082
  security:
    enabled: true
    component: false
    org-id: false
    role-type: adapter
    open-paths: |
      /api-docs/**,
      /swagger/**,
      /actuator/health,
      /ready,
      /offset
  kafka:
    enable-ssl: false

novari:
  kafka:
    application-id: provider
    default-replicas: 1

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: provider

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger/ui

logging:
  level:
    root: INFO
