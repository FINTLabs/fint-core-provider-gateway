fint:
  provider:
    ensure-topics: false
    org-ids:
      - afk-no
      - agderfk-no
      - bfk-no
      - ffk-no
      - fintlabs-no
      - innlandetfylke-no
      - mrfylke-no
      - nfk-no
      - ofk-no
      - rogfk-no
      - telemarkfylke-no
      - tromsfylke-no
      - trondelagfylke-no
      - ude-oslo-kommune-no
      - vestfoldfylke-no
      - visma-com
      - vlfk-no
  metamodel:
    base-url: http://fint-core-consumer-metamodel:8080
  security:
    component: false
    org-id: false
    role-type: adapter
    open-paths: |
      /api-docs/**,
      /swagger/**,
      /actuator/health,
      /ready,
      /offset
  kafka:
    enable-ssl: true

novari:
  kafka:
    topic:
      org-id: fintlabs-no
      domain-context: fint-core
    application-id: provider
    producer:
      linger: 0ms
      batch-size: 64KB

spring:
  threads:
    virtual:
      enabled: true
  kafka:
    consumer:
      group-id: provider
  webflux:
    base-path: /provider
  http:
    codecs:
      max-in-memory-size: 200MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger/ui

logging:
  level:
    root: INFO
    org.apache.kafka: WARN
server:
  netty:
    connection-timeout: 600000
  tomcat:
    threads:
      max: 400
    max-connections: 30000
