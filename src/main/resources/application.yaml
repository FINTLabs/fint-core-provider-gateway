fint:
  metamodel:
    base-url: http://fint-core-consumer-metamodel:8080
  kafka:
    enable-ssl: true

novari:
  kafka:
    topic:
      org-id: fintlabs-no
      domain-context: fint-core
    application-id: provider
    producer:
      linger: 0ms
      batch-size: 64KB

spring:
  config:
    import:
      - classpath:components.yaml
      - classpath:cleanup-topics.yaml
  threads:
    virtual:
      enabled: true
  kafka:
    consumer:
      group-id: provider

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    root: INFO
    org.apache.kafka: WARN
server:
  servlet:
    context-path: /provider
  tomcat:
    threads:
      max: 400
    max-connections: 30000
