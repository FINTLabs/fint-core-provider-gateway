fint:
  provider:
    components:

      # ===== Utdanning =====
      - domain-name: utdanning
        package-name: vurdering
        relation-update: true
        org-ids: &utdanning-orgs
          - afk-no
          - agderfk-no
          - bfk-no
          - ffk-no
          - innlandetfylke-no
          - mrfylke-no
          - nfk-no
          - ofk-no
          - rogfk-no
          - telemarkfylke-no
          - tromsfylke-no
          - trondelagfylke-no
          - ude-oslo-kommune-no
          - vestfoldfylke-no
          - vlfk-no
      - domain-name: utdanning
        package-name: elev
        relation-update: true
        org-ids: *utdanning-orgs
      - domain-name: utdanning
        package-name: kodeverk
        relation-update: true
        org-ids: *utdanning-orgs
      - domain-name: utdanning
        package-name: larling
        relation-update: false
        org-ids: *utdanning-orgs
      - domain-name: utdanning
        package-name: ot
        relation-update: false
        org-ids: *utdanning-orgs
      - domain-name: utdanning
        package-name: timeplan
        relation-update: true
        org-ids: *utdanning-orgs
      - domain-name: utdanning
        package-name: utdanningsprogram
        relation-update: true
        org-ids: *utdanning-orgs

      # ===== Administrasjon =====
      - domain-name: administrasjon
        package-name: fullmakt
        org-ids: &administrasjon-orgs
          - evry-com
          - rogfk-no
          - sdworx-com
          - telemarkfylke-no
          - th-rogfk-no
          - trondelagfylke-no
          - vestfoldfylke-no
      - domain-name: administrasjon
        package-name: kodeverk
        org-ids: *administrasjon-orgs
      - domain-name: administrasjon
        package-name: organisasjon
        org-ids: *administrasjon-orgs
      - domain-name: administrasjon
        package-name: personal
        org-ids: *administrasjon-orgs

      # ===== Okonomi =====
      - domain-name: okonomi
        package-name: regnskap
        org-ids:
          - agderfk-no
          - ffk-no
          - innlandetfylke-no
          - mrfylke-no
          - nfk-no
          - tromsfylke-no
          - trondelagfylke-no
          - ude-oslo-kommune-no
          - visma-com
          - vlfk-no

      # ===== Ressurs =====
      - domain-name: ressurs
        package-name: eiendel
        org-ids: &ressurs-orgs
          - afk-no
          - bfk-no
          - ofk-no
      - domain-name: ressurs
        package-name: kodeverk
        org-ids: *ressurs-orgs
      - domain-name: ressurs
        package-name: tilgang
        org-ids: *ressurs-orgs

      # ===== Personvern =====
      - domain-name: personvern
        package-name: kodeverk
        org-ids:
          - fintlabs-no
      - domain-name: personvern
        package-name: samtykke
        org-ids:
          - rogfk-no
          - trondelagfylke-no
